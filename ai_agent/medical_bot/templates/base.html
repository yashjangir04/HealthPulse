<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPulse AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Phosphor Icons for UI Elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo-box">
                    <i class="ph-fill ph-heartbeat icon-accent"></i>
                </div>
                <h2>HealthPulse<span class="highlight">AI</span></h2>
            </div>
            
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' else '' }}">
                    <i class="ph ph-chat-teardrop-text"></i>
                    <span>Consult AI</span>
                </a>
                <a href="{{ url_for('personal') }}" class="{{ 'active' if request.endpoint == 'personal' else '' }}">
                    <i class="ph ph-user-circle"></i>
                    <span>Medical Profile</span>
                </a>
            </div>
            
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <div class="dot online"></div>
                    <span>System Active</span>
                </div>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content fade-in">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
